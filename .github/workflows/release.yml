name: "Release"

# Triggers:
# - `release: published` → GitHub release (draft turned published, or created
#   non-draft) kicks off the cross-platform build and attaches installers to
#   that release.
# - `workflow_dispatch` → manual run against an existing tag, useful for
#   retrying a release or for a tag where the workflow didn't fire (e.g. a
#   release created before this workflow existed).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build for (e.g. v0.9.2). Leave blank to use the release that triggered the workflow."
        required: false
        type: string

jobs:
  resolve-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.resolve.outputs.release-id }}
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve release id / tag
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            let releaseId, tag;

            if (context.eventName === 'release') {
              releaseId = context.payload.release.id;
              tag = context.payload.release.tag_name;
            } else {
              tag = (context.payload.inputs && context.payload.inputs.tag || '').trim();
              if (!tag) {
                core.setFailed("workflow_dispatch requires the `tag` input when not triggered by a release event.");
                return;
              }
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              releaseId = data.id;
            }

            const version = tag.replace(/^v/, '');
            core.setOutput('release-id', String(releaseId));
            core.setOutput('tag', tag);
            core.setOutput('version', version);
            core.info(`Building for release ${tag} (id=${releaseId})`);

  publish-tauri:
    permissions:
      contents: write
    needs: resolve-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-26" # for Arm based macs (M1 and above). Uses macOS 26 for Apple Intelligence SDK.
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: "macos-latest" # for Intel based macs.
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # Build .deb on 22.04
            args: "--bundles deb"
            target: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-24.04" # Build AppImage and RPM on 24.04
            args: "--bundles appimage,rpm"
            target: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-24.04-arm" # Build for ARM64 Linux
            args: "--bundles appimage,deb,rpm"
            target: "aarch64-unknown-linux-gnu"
          - platform: "windows-latest"
            args: ""
            target: "x86_64-pc-windows-msvc"
          - platform: "windows-11-arm" # for ARM64 Windows runner
            args: "--target aarch64-pc-windows-msvc"
            target: "aarch64-pc-windows-msvc"

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      sign-binaries: true
      asset-prefix: "escribbo"
      upload-artifacts: false
      release-id: ${{ needs.resolve-release.outputs.release-id }}
    secrets: inherit
