name: "Release"

# Draft-first: the GitHub release stays a draft until every platform build
# succeeds and uploads assets. A final job then publishes it.
#
# Triggers:
# - `release: created` on a **draft** release (e.g. `gh release create v0.9.3
#   --draft --generate-notes` after the tag exists).
# - `workflow_dispatch` with `tag` (e.g. v0.9.3): finds that draft release or
#   creates one, then builds and publishes.
#
# Skips cleanly when a release is created already published (non-draft): no
# duplicate builds when you used to publish immediately.
on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.9.3). Tag must exist on the remote. Creates a draft release if none exists."
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  resolve-release:
    if: github.event_name == 'workflow_dispatch' || github.event.release.draft
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.resolve.outputs.release-id }}
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve or create draft release
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let releaseId;
            let tag;

            if (context.eventName === 'workflow_dispatch') {
              tag = (context.payload.inputs.tag || '').trim();
              if (!tag) {
                core.setFailed('`tag` is required for workflow_dispatch.');
                return;
              }
              let data;
              try {
                ({ data } = await github.rest.repos.getReleaseByTag({ owner, repo, tag }));
              } catch (e) {
                if (e.status !== 404) throw e;
                core.info(`No release for ${tag}; creating draft…`);
                ({ data } = await github.rest.repos.createRelease({
                  owner,
                  repo,
                  tag_name: tag,
                  name: tag,
                  draft: true,
                  prerelease: false,
                  generate_release_notes: true,
                }));
              }
              if (!data.draft) {
                core.setFailed(
                  `Release ${tag} is already published. Delete it or use a new tag; this workflow only finishes draft releases.`,
                );
                return;
              }
              releaseId = data.id;
            } else {
              const rel = context.payload.release;
              releaseId = rel.id;
              tag = rel.tag_name;
              if (!rel.draft) {
                core.setFailed('Expected a draft release; this should not run.');
                return;
              }
            }

            const version = tag.replace(/^v/, '');
            core.setOutput('release-id', String(releaseId));
            core.setOutput('tag', tag);
            core.setOutput('version', version);
            core.info(`Building for draft release ${tag} (id=${releaseId})`);

  publish-tauri:
    permissions:
      contents: write
    needs: resolve-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-26" # for Arm based macs (M1 and above). Uses macOS 26 for Apple Intelligence SDK.
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: "macos-latest" # for Intel based macs.
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # Build .deb on 22.04
            args: "--bundles deb"
            target: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-24.04" # Build AppImage and RPM on 24.04
            args: "--bundles appimage,rpm"
            target: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-24.04-arm" # Build for ARM64 Linux
            args: "--bundles appimage,deb,rpm"
            target: "aarch64-unknown-linux-gnu"
          - platform: "windows-latest"
            args: ""
            target: "x86_64-pc-windows-msvc"
          - platform: "windows-11-arm" # for ARM64 Windows runner
            args: "--target aarch64-pc-windows-msvc"
            target: "aarch64-pc-windows-msvc"

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      sign-binaries: true
      asset-prefix: "escribbo"
      upload-artifacts: false
      release-id: ${{ needs.resolve-release.outputs.release-id }}
    secrets: inherit

  finalize-release:
    name: Publish release (remove draft)
    needs: [resolve-release, publish-tauri]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Mark release as latest (public)
        uses: actions/github-script@v7
        with:
          script: |
            const release_id = parseInt('${{ needs.resolve-release.outputs.release-id }}', 10);
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id,
              draft: false,
            });
            core.info(`Release ${{ needs.resolve-release.outputs.tag }} is now public.`);
