name: "Release"

on:
  workflow_dispatch:
    inputs:
      upload_to_existing_tag:
        description: "If set (e.g. v0.9.2), upload build assets to that release instead of creating a new draft"
        required: false
        default: ""
        type: string
      git_ref:
        description: "Optional ref to build (e.g. refs/tags/v0.9.2). Default is the branch that runs the workflow."
        required: false
        default: ""
        type: string

jobs:
  prepare-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.resolve-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.git_ref != '' && github.event.inputs.git_ref || github.ref }}

      - name: Get version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "Application version from tauri.conf.json: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Use existing release or create draft
        id: resolve-release
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const version = "${{ steps.get-version.outputs.version }}";
            const existingTag = `${{ github.event.inputs.upload_to_existing_tag }}`.trim();

            if (existingTag) {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: existingTag,
              });
              core.info(`Uploading assets to existing release ${existingTag} (id=${data.id})`);
              return data.id;
            }

            const { data } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: `v${version}`,
              name: `v${version}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true,
            });
            core.info(`Created draft release v${version} (id=${data.id})`);
            return data.id;

  publish-tauri:
    permissions:
      contents: write
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-26" # for Arm based macs (M1 and above). Uses macOS 26 for Apple Intelligence SDK.
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: "macos-latest" # for Intel based macs.
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # Build .deb on 22.04
            args: "--bundles deb"
            target: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-24.04" # Build AppImage and RPM on 24.04
            args: "--bundles appimage,rpm"
            target: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-24.04-arm" # Build for ARM64 Linux
            args: "--bundles appimage,deb,rpm"
            target: "aarch64-unknown-linux-gnu"
          - platform: "windows-latest"
            args: ""
            target: "x86_64-pc-windows-msvc"
          - platform: "windows-11-arm" # for ARM64 Windows runner
            args: "--target aarch64-pc-windows-msvc"
            target: "aarch64-pc-windows-msvc"

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      sign-binaries: true
      asset-prefix: "escribbo"
      upload-artifacts: false
      release-id: ${{ needs.prepare-release.outputs.release-id }}
      ref: ${{ github.event.inputs.git_ref != '' && github.event.inputs.git_ref || github.ref }}
    secrets: inherit
