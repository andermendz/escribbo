name: "Release"

# Flow:
# 1. You create a DRAFT release (e.g. `gh release create vX.Y.Z --draft --generate-notes`).
# 2. The `release.created` event fires → this workflow runs the full matrix
#    against the draft's release id, uploading installers to it.
# 3. When the matrix finishes (even if one platform fails), the `finalize` job
#    flips the release out of draft so users see it on the Releases page with
#    whatever assets built successfully.
#
# If you create a non-draft release directly, the same flow still works — the
# finalize step is a no-op on an already-published release.
on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build for (e.g. v0.9.2). Leave blank to use the release that triggered the workflow."
        required: false
        type: string

jobs:
  resolve-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.resolve.outputs.release-id }}
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve release id / tag
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            let releaseId, tag;

            if (context.eventName === 'release') {
              releaseId = context.payload.release.id;
              tag = context.payload.release.tag_name;
            } else {
              tag = (context.payload.inputs && context.payload.inputs.tag || '').trim();
              if (!tag) {
                core.setFailed("workflow_dispatch requires the `tag` input when not triggered by a release event.");
                return;
              }
              // Look up release by tag. This uses the private endpoint so it
              // also finds drafts (getReleaseByTag skips them).
              const releases = await github.paginate(github.rest.repos.listReleases, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });
              const match = releases.find(r => r.tag_name === tag);
              if (!match) {
                core.setFailed(`No release found for tag ${tag}. Create a (draft) release first.`);
                return;
              }
              releaseId = match.id;
            }

            const version = tag.replace(/^v/, '');
            core.setOutput('release-id', String(releaseId));
            core.setOutput('tag', tag);
            core.setOutput('version', version);
            core.info(`Building for release ${tag} (id=${releaseId})`);

  publish-tauri:
    permissions:
      contents: write
    needs: resolve-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-26" # for Arm based macs (M1 and above). Uses macOS 26 for Apple Intelligence SDK.
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: "macos-latest" # for Intel based macs.
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # Build .deb on 22.04
            args: "--bundles deb"
            target: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-24.04" # Build AppImage and RPM on 24.04
            args: "--bundles appimage,rpm"
            target: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-24.04-arm" # Build for ARM64 Linux
            args: "--bundles appimage,deb,rpm"
            target: "aarch64-unknown-linux-gnu"
          - platform: "windows-latest"
            args: ""
            target: "x86_64-pc-windows-msvc"
          - platform: "windows-11-arm" # for ARM64 Windows runner
            args: "--target aarch64-pc-windows-msvc"
            target: "aarch64-pc-windows-msvc"

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      sign-binaries: true
      asset-prefix: "escribbo"
      upload-artifacts: false
      release-id: ${{ needs.resolve-release.outputs.release-id }}
    secrets: inherit

  finalize:
    # Runs after the whole matrix finishes so a single-platform failure (e.g.
    # macOS signing flake) doesn't block publishing the builds that succeeded.
    needs: [resolve-release, publish-tauri]
    if: always() && needs.resolve-release.result == 'success'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Publish release (flip draft → public)
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.resolve-release.outputs.release-id }}
          TAG: ${{ needs.resolve-release.outputs.tag }}
          BUILD_RESULT: ${{ needs.publish-tauri.result }}
        with:
          script: |
            const releaseId = Number(process.env.RELEASE_ID);
            const tag = process.env.TAG;
            const buildResult = process.env.BUILD_RESULT;

            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });

            if (!release.draft) {
              core.info(`${tag} is already published; nothing to do.`);
              return;
            }

            if (buildResult === 'cancelled') {
              core.warning(`Build was cancelled; leaving ${tag} as a draft.`);
              return;
            }

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              draft: false,
            });
            core.info(`Published ${tag} (build result: ${buildResult}).`);
